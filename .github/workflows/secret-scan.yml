name: secret-scan

# Block company / secret material from the public tree. Generic high-confidence patterns always run; the
# org-specific denylist is supplied out-of-band via the SECRET_PATTERNS repo secret (never committed).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Scan tracked tree
        env:
          VTS_SECRET_PATTERNS: ${{ secrets.SECRET_PATTERNS }}
        run: node scripts/secret-scan.mjs --tree
